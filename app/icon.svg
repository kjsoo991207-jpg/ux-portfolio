<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Shared vertical stem (J and K share one stem) -->
  <rect x="5.5" y="2" width="1.8" height="10.5" fill="#111"/>
  <!-- Top serif -->
  <rect x="4" y="2" width="4.8" height="1" fill="#111"/>
  <!-- J curl at bottom -->
  <path d="M5.5,12.5 Q5.5,14.5 3.5,14.5 Q2,14.5 2,13 Q2,12 3,12" fill="none" stroke="#111" stroke-width="1.1" stroke-linecap="round"/>
  <!-- K upper arm -->
  <polygon points="7.3,8 12,2.5 13.5,2.5 13.5,3.5 7.3,9" fill="#111"/>
  <!-- K lower arm -->
  <polygon points="7.3,9 13,14.5 14,14.5 14,13.5 7.3,8" fill="#111"/>
  <!-- K bottom serif -->
  <rect x="12" y="13.5" width="2.5" height="1" fill="#111"/>
</svg>
