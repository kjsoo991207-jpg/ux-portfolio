<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- K vertical stem -->
  <rect x="18" y="5" width="2" height="22" fill="#111"/>
  <!-- K top serif -->
  <rect x="16.5" y="5" width="5" height="1.2" fill="#111"/>
  <!-- K bottom serif -->
  <rect x="16.5" y="25.8" width="5" height="1.2" fill="#111"/>
  <!-- K upper arm -->
  <polygon points="18,16 18,14.5 11,5 9,5 9,6.5 17,16" fill="#111"/>
  <!-- K lower arm -->
  <polygon points="18,17.5 18,19 24,27 26,27 26,25.5 19,17.5" fill="#111"/>
  <!-- K lower arm serif -->
  <rect x="23.5" y="25.8" width="3.5" height="1.2" fill="#111"/>

  <!-- J stem -->
  <rect x="9" y="5" width="2" height="16" fill="#111"/>
  <!-- J top serif -->
  <rect x="7.5" y="5" width="5" height="1.2" fill="#111"/>
  <!-- J curl -->
  <path d="M9,21 Q9,25 7,26 Q5,27 4,25 Q3.5,23.5 5,22.8 Q6.2,22.5 6.8,23.5 Q7,24.5 6,25" fill="none" stroke="#111" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Weave: J over K's upper arm -->
  <rect x="8.5" y="8" width="3" height="7" fill="white"/>
  <rect x="9" y="8" width="2" height="7" fill="#111"/>
</svg>
