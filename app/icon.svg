<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- K vertical stem -->
  <rect x="19" y="1" width="2.5" height="30" fill="#111"/>
  <!-- K top serif -->
  <rect x="17.5" y="1" width="5.5" height="1.5" fill="#111"/>
  <!-- K bottom serif -->
  <rect x="17.5" y="29.5" width="5.5" height="1.5" fill="#111"/>
  <!-- K upper arm -->
  <polygon points="19,15 19,13 9,1 7,1 7,3 18,15" fill="#111"/>
  <!-- K lower arm -->
  <polygon points="19,17 19,19 27,29.5 29.5,29.5 29.5,27.5 20,17" fill="#111"/>
  <!-- K lower arm serif -->
  <rect x="27" y="29.5" width="4" height="1.5" fill="#111"/>

  <!-- J stem -->
  <rect x="7" y="1" width="2.5" height="21" fill="#111"/>
  <!-- J top serif -->
  <rect x="5.5" y="1" width="5.5" height="1.5" fill="#111"/>
  <!-- J curl -->
  <path d="M7,22 Q7,27 4,28 Q1,29 0.5,26 Q0.5,24 2.5,23.5 Q4,23.5 4.5,25 Q4.5,26 3.5,26.5" fill="none" stroke="#111" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Weave: J over K's upper arm -->
  <rect x="6.5" y="5" width="3.5" height="9" fill="white"/>
  <rect x="7" y="5" width="2.5" height="9" fill="#111"/>
</svg>
