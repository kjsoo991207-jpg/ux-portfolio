<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- J stem -->
  <rect x="4" y="2" width="1.5" height="9" fill="#111"/>
  <!-- J top serif -->
  <rect x="3" y="2" width="4" height="1" fill="#111"/>
  <!-- J curl -->
  <path d="M4,11 Q4,13.5 2.5,13.5 Q1.5,13.5 1.5,12.5 Q1.5,11.5 2.5,11.5" fill="none" stroke="#111" stroke-width="1.2" stroke-linecap="round"/>

  <!-- K stem -->
  <rect x="10" y="2" width="1.5" height="12" fill="#111"/>
  <!-- K top serif -->
  <rect x="9" y="2" width="4" height="1" fill="#111"/>
  <!-- K bottom serif -->
  <rect x="9" y="13" width="4" height="1" fill="#111"/>
  <!-- K upper arm -->
  <polygon points="10,8 10,7 6,2.5 5,2.5 5,3.5 9.5,8" fill="#111"/>
  <!-- K lower arm -->
  <polygon points="10,8.5 10,9.5 13.5,14 14.5,14 14.5,13 11,8.5" fill="#111"/>

  <!-- Weave: J over K arm -->
  <rect x="3.5" y="4" width="2.5" height="4" fill="white"/>
  <rect x="4" y="4" width="1.5" height="4" fill="#111"/>
</svg>
